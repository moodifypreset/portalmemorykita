<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap'); body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
    <script src="pengaturan.js"></script>
</head>
<body class="text-slate-800">
    <!-- HEADER -->
    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 w-10 h-10 rounded-lg flex items-center justify-center text-xl shadow-lg"><i class="fa-solid fa-lock"></i></div>
                <div><h1 class="font-bold text-lg leading-tight">Admin Dashboard</h1><p class="text-xs text-blue-300">Generator & Monitoring</p></div>
            </div>
            <div class="flex items-center gap-3">
                <span class="flex items-center gap-2 text-xs font-medium bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700"><span id="dbStatus" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span> DB Status</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- PANEL KIRI: GENERATOR -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 h-fit">
            <h2 class="font-bold text-lg mb-6 flex items-center gap-2"><i class="fa-solid fa-link text-blue-600"></i> Generate Link Klien</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Nama Klien / Pasangan</label>
                    <input type="text" id="inputName" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Cth: Budi & Siska">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Link Google Drive</label>
                    <input type="text" id="inputDrive" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Paste link folder Drive...">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Batas Kuota Foto (Opsional)</label>
                    <input type="number" id="inputQuota" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Kosongkan jika tanpa limit">
                </div>
                <button onclick="generateAndSaveLink()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition shadow-md mt-4 flex justify-center items-center gap-2">
                    <i class="fa-solid fa-magic"></i> Buat & Simpan Link
                </button>
            </div>
        </div>

        <!-- PANEL KANAN: DAFTAR & MONITORING -->
        <div class="lg:col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-lg flex items-center gap-2"><i class="fa-solid fa-users-viewfinder text-blue-600"></i> Live Monitoring Klien</h2>
                <button onclick="fetchHistory()" class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-medium transition"><i class="fa-solid fa-rotate-right mr-1"></i> Refresh</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b-2 border-slate-100 text-sm text-slate-500">
                            <th class="py-3 px-2 font-bold">Status</th>
                            <th class="py-3 px-2 font-bold">Nama Klien</th>
                            <th class="py-3 px-2 font-bold">Kuota</th>
                            <th class="py-3 px-2 font-bold">Dibuat Pada</th>
                            <th class="py-3 px-2 font-bold text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="clientTableBody" class="text-sm divide-y divide-slate-100">
                        <tr><td colspan="5" class="py-8 text-center text-slate-400">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white px-6 py-3 rounded-lg shadow-2xl transform translate-y-24 opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-green-400"></i><span id="toastText" class="font-medium">Berhasil</span>
    </div>

    <script>
        const supabaseClient = supabase.createClient(CONFIG_APP.supabaseUrl, CONFIG_APP.supabaseKey);
        let onlineClientsMap = {}; 

        function extractFolderId(url) {
            const match = url.match(/folders\/([a-zA-Z0-9-_]+)/); if (match && match[1]) return match[1];
            return url.match(/id=([a-zA-Z0-9-_]+)/)?.[1] || url;
        }

        function showToast(msg) {
            document.getElementById('toastText').textContent = msg;
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-24', 'opacity-0'), 3000);
        }

        async function generateAndSaveLink() {
            const name = document.getElementById('inputName').value.trim();
            const drive = document.getElementById('inputDrive').value.trim();
            const quota = document.getElementById('inputQuota').value.trim();

            if(!name || !drive) return alert("Nama Klien dan Link Drive wajib diisi!");
            const folderId = extractFolderId(drive);

            // Simpan ke DB
            const { error } = await supabaseClient.from('portal_links').insert([
                { client_name: name, folder_id: folderId, kuota: quota ? parseInt(quota) : null }
            ]);

            if (error) {
                console.error(error); alert("Gagal menyimpan ke database.");
            } else {
                showToast("Link berhasil digenerate & disimpan!");
                document.getElementById('inputName').value = '';
                document.getElementById('inputDrive').value = '';
                document.getElementById('inputQuota').value = '';
                fetchHistory();
            }
        }

        function buildClientUrl(name, folderId, quota) {
            // Otomatis mendeteksi base URL dari file admin ini, lalu diarahkan ke index.html
            let baseUrl = window.location.href.split('?')[0].replace('admin.html', 'index.html');
            if(!baseUrl.endsWith('index.html')) baseUrl += 'index.html'; 
            
            let url = `${baseUrl}?n=${encodeURIComponent(name.replace(/\s+/g, '-'))}&i=${folderId}`;
            if (quota) url += `&k=${btoa(quota.toString())}`;
            return url;
        }

        function copyLink(url) {
            const ta = document.createElement("textarea"); ta.value = url; 
            document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            showToast("Link dicopy ke clipboard!");
        }

        async function fetchHistory() {
            const { data, error } = await supabaseClient.from('portal_links').select('*').order('created_at', { ascending: false });
            const tbody = document.getElementById('clientTableBody');
            tbody.innerHTML = '';

            if (error) { tbody.innerHTML = `<tr><td colspan="5" class="py-4 text-center text-red-500">Gagal mengambil data</td></tr>`; return; }
            if (data.length === 0) { tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-slate-400">Belum ada link yang dibuat.</td></tr>`; return; }

            data.forEach(row => {
                const tr = document.createElement('tr');
                const isOnline = onlineClientsMap[row.folder_id];
                const statusHtml = isOnline 
                    ? `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[11px] font-bold bg-green-50 text-green-600 border border-green-200"><span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> ONLINE</span>` 
                    : `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[11px] font-bold bg-slate-100 text-slate-500 border border-slate-200"><span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span> OFFLINE</span>`;
                
                const date = new Date(row.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                const url = buildClientUrl(row.client_name, row.folder_id, row.kuota);

                tr.innerHTML = `
                    <td class="py-4 px-2" id="status-${row.folder_id}">${statusHtml}</td>
                    <td class="py-4 px-2 font-bold text-slate-800">${row.client_name}</td>
                    <td class="py-4 px-2 font-medium">${row.kuota ? `${row.kuota} Foto` : '<span class="text-slate-400 italic">No Limit</span>'}</td>
                    <td class="py-4 px-2 text-slate-500">${date}</td>
                    <td class="py-4 px-2 text-right">
                        <button onclick="copyLink('${url}')" class="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white border border-blue-200 px-3 py-1.5 rounded-lg text-xs font-bold transition shadow-sm"><i class="fa-regular fa-copy"></i> Copy Link</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // INIT KONEKSI PRESENCE UNTUK MONITORING GLOBAL
        function initMonitoring() {
            document.getElementById('dbStatus').classList.replace('bg-yellow-500', 'bg-green-500');
            const presenceChannel = supabaseClient.channel('global-monitoring');
            
            presenceChannel.on('presence', { event: 'sync' }, () => {
                const state = presenceChannel.presenceState();
                onlineClientsMap = {};
                for (const key in state) {
                    state[key].forEach(user => {
                        onlineClientsMap[user.folder_id] = true;
                    });
                }
                fetchHistory(); // Refresh tampilan tabel saat ada perubahan status
            }).subscribe();
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchHistory();
            initMonitoring();
        });
    </script>
</body>
</html>
